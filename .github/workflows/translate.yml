name: Translate Readme

on:
  push:
    branches: ['main']

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Translate with Zhipu (Free Forever)
        env:
          ZHIPU_KEY: ${{ secrets.ZHIPU_API_KEY }}  # 只需在Secrets里设置这一个
        run: |
          python << 'PYEOF'
          import requests, os, json
          
          # 读取中文README
          with open('README.md', 'r', encoding='utf-8') as f:
              text = f.read()
          
          # 调用智谱 GLM-4-Flash（永久免费）
          resp = requests.post(
              "https://open.bigmodel.cn/api/paas/v4/chat/completions",
              headers={"Authorization": f"Bearer {os.environ['ZHIPU_KEY']}"},
              json={
                  "model": "glm-4-flash",  # 永久免费模型
                  "messages": [
                      {"role": "system", "content": "将中文README翻译成英文，保留markdown格式和代码块不翻译"},
                      {"role": "user", "content": text}
                  ]
              }
          ).json()
          
          # 写入英文README
          with open('README.en.md', 'w', encoding='utf-8') as f:
              f.write(resp['choices'][0]['message']['content'])
          PYEOF
          
      - name: Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.en.md
          git diff --staged --quiet || (git commit -m "docs: auto translate" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.ELEMENT_TOKEN_CLASSIC }}
