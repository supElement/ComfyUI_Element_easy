name: Translate Readme

on:
  push:
    branches: ['**']  

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 3

      - name: Auto Translate
        uses: Lin-jun-xiang/action-translate-readme@v2
        with:
          token: ${{ secrets.ELEMENT_TOKEN_CLASSIC }} 
          langs: "en"
          zhipuai: ${{ secrets.ZHIPU_API_KEY }}
